name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            export NVM_DIR="$HOME/.nvm"
            source $NVM_DIR/nvm.sh

            cd /home/ubuntu/ci-cd-test
            git pull origin main
            npm install
            pm2 restart project-two